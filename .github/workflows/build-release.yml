name: Build Release Assets

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag_name:
        required: true
        type: string

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Desktop Builds (using Makefile)
  # ============================================

  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Update version file
        run: echo "${{ inputs.version }}" > .version

      - name: Setup MSYS2 for CGO
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Initialize project
        shell: bash
        run: |
          git submodule update --init --recursive
          go mod tidy

      - name: Get Go path for MSYS2
        id: go-path
        shell: bash
        run: |
          GO_BIN_PATH=$(dirname "$(which go)")
          echo "GO_BIN_PATH=$GO_BIN_PATH" >> $GITHUB_OUTPUT
          echo "Go binary path: $GO_BIN_PATH"

      - name: Build Windows SDK
        shell: msys2 {0}
        run: |
          # Add MinGW to PATH
          export PATH="/mingw64/bin:$PATH"

          # Add Go to PATH (convert from bash step output)
          GO_WIN_PATH="${{ steps.go-path.outputs.GO_BIN_PATH }}"
          if [ -n "$GO_WIN_PATH" ]; then
            GO_MSYS_PATH=$(cygpath -u "$GO_WIN_PATH")
            export PATH="$GO_MSYS_PATH:$PATH"
            echo "Added Go path: $GO_MSYS_PATH"
          fi

          echo "Go version: $(go version)"
          mkdir -p sdk
          cd third_party/opennhp/nhp && go mod tidy
          cd ../endpoints && go mod tidy
          CGO_ENABLED=1 CC=gcc go build -a -trimpath -buildmode=c-shared -ldflags="-w -s" -o ../../../sdk/nhp-agent.dll ./agent/main/main.go ./agent/main/export.go

      - name: Build Windows CLI
        shell: bash
        run: |
          mkdir -p release/etc release/sdk
          go build -trimpath -ldflags="-w -s" -o release/stealth-dns.exe ./main.go
          cp -r etc/* release/etc/
          cp sdk/nhp-agent.dll release/sdk/ 2>/dev/null || true

      - name: Build Windows UI
        shell: bash
        run: |
          cd ui
          go mod tidy
          cd frontend && npm ci && cd ..
          wails build -platform windows/amd64 -o stealthdns-ui.exe

      - name: Package Windows Release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path dist/sdk
          Copy-Item ui/build/bin/stealthdns-ui.exe dist/
          Copy-Item release/stealth-dns.exe dist/
          Copy-Item sdk/nhp-agent.dll dist/sdk/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse release/etc dist/
          Compress-Archive -Path dist/* -DestinationPath StealthDNS-${{ inputs.version }}-windows-amd64.zip

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: StealthDNS-${{ inputs.version }}-windows-amd64.zip

  build-macos:
    name: macOS Desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Update version file
        run: echo "${{ inputs.version }}" > .version

      - name: Build SDK and UI using Makefile
        run: |
          mkdir -p release
          make init
          make build-sdk-macos
          make build
          make ui

      - name: Package macOS Release (PKG Installer)
        run: |
          # Create self-contained .app bundle
          # Structure: StealthDNS.app/Contents/{MacOS/stealth-dns, Resources/{etc,sdk}}

          # Get the app bundle
          APP_SRC="release/stealthdns-ui.app"
          if [ ! -d "$APP_SRC" ]; then
            APP_SRC="ui/build/bin/stealthdns-ui.app"
          fi

          # Create package root
          mkdir -p pkg-root/Applications
          cp -r "$APP_SRC" pkg-root/Applications/StealthDNS.app

          # Update Info.plist with correct app name
          INFO_PLIST="pkg-root/Applications/StealthDNS.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName StealthDNS" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName StealthDNS" "$INFO_PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string StealthDNS" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.opennhp.stealthdns" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" "$INFO_PLIST"

          # Embed CLI in Contents/MacOS/ (same directory as UI executable)
          cp release/stealth-dns pkg-root/Applications/StealthDNS.app/Contents/MacOS/

          # Embed SDK and config in Contents/MacOS/ (CLI looks for etc/ relative to itself)
          mkdir -p pkg-root/Applications/StealthDNS.app/Contents/MacOS/sdk
          mkdir -p pkg-root/Applications/StealthDNS.app/Contents/MacOS/etc
          cp release/sdk/nhp-agent.dylib pkg-root/Applications/StealthDNS.app/Contents/MacOS/sdk/ 2>/dev/null || true
          cp -r release/etc/* pkg-root/Applications/StealthDNS.app/Contents/MacOS/etc/

          # Set permissions
          chmod -R 755 pkg-root/Applications/StealthDNS.app
          chmod +x pkg-root/Applications/StealthDNS.app/Contents/MacOS/*

          # Build PKG installer
          pkgbuild --root pkg-root \
                   --identifier com.opennhp.stealthdns \
                   --version ${{ inputs.version }} \
                   --install-location / \
                   StealthDNS-${{ inputs.version }}-macos-universal.pkg

      - name: Upload macOS Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: StealthDNS-${{ inputs.version }}-macos-universal.pkg

  build-linux:
    name: Linux Desktop
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev nsis

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Update version file
        run: echo "${{ inputs.version }}" > .version

      - name: Build SDK and UI using Makefile
        run: |
          mkdir -p release
          make init
          make build-sdk-linux
          make build
          make ui

      - name: Package Linux Release
        run: |
          mkdir -p dist/StealthDNS-${{ inputs.version }}
          # Copy UI
          cp ui/build/bin/stealthdns-ui dist/StealthDNS-${{ inputs.version }}/stealthdns-ui
          # Copy CLI
          cp release/stealth-dns dist/StealthDNS-${{ inputs.version }}/stealth-dns
          # Copy SDK
          mkdir -p dist/StealthDNS-${{ inputs.version }}/sdk
          cp release/sdk/nhp-agent.so dist/StealthDNS-${{ inputs.version }}/sdk/ 2>/dev/null || \
            cp sdk/nhp-agent.so dist/StealthDNS-${{ inputs.version }}/sdk/ 2>/dev/null || true
          # Copy config
          cp -r release/etc dist/StealthDNS-${{ inputs.version }}/ 2>/dev/null || \
            cp -r etc dist/StealthDNS-${{ inputs.version }}/
          cd dist && tar -czvf ../StealthDNS-${{ inputs.version }}-linux-amd64.tar.gz StealthDNS-${{ inputs.version }}

      - name: Upload Linux Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: StealthDNS-${{ inputs.version }}-linux-amd64.tar.gz

  # ============================================
  # Mobile Builds (using mobile/Makefile)
  # ============================================

  build-android:
    name: Android Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          cd mobile && make setup-gomobile

      - name: Update version in build.gradle.kts
        run: |
          cd mobile/android/app
          sed -i 's/versionName = "[^"]*"/versionName = "${{ inputs.version }}"/' build.gradle.kts
          VERSION_CODE=$(echo "${{ inputs.version }}" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" build.gradle.kts

      - name: Build Android using Makefile
        run: |
          cd mobile && make android

      - name: Sign APK (if secrets available)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > mobile/android/keystore.jks
          export ANDROID_KEYSTORE_PATH=$(pwd)/mobile/android/keystore.jks
          cd mobile/android && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp mobile/build/android/StealthDNS-Browser.apk StealthDNS-${{ inputs.version }}-android.apk || \
            cp mobile/android/app/build/outputs/apk/release/app-release.apk StealthDNS-${{ inputs.version }}-android.apk

      - name: Upload Android Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: StealthDNS-${{ inputs.version }}-android.apk

  build-ios:
    name: iOS Mobile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install gomobile
        run: |
          cd mobile && make setup-gomobile

      - name: Update version in Info.plist
        run: |
          cd mobile/ios/StealthDNS
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" Info.plist
          VERSION_CODE=$(echo "${{ inputs.version }}" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" Info.plist

      - name: Build iOS using Makefile
        run: |
          cd mobile && make ios

      - name: Create IPA (Unsigned - for sideloading)
        run: |
          cd mobile/build/ios/StealthDNS.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r StealthDNS.app Payload/
          zip -r ../../../StealthDNS-${{ inputs.version }}-ios.ipa Payload

      - name: Upload iOS Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: mobile/build/ios/StealthDNS-${{ inputs.version }}-ios.ipa

  # ============================================
  # Update Release Notes
  # ============================================

  update-release:
    name: Update Release Description
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Update Release Body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          append_body: true
          body: |

            ---

            ## Downloads

            | Platform | Type | Description |
            |----------|------|-------------|
            | Windows | Desktop | Full-featured GUI with system tray, DNS proxy service |
            | macOS | Desktop | Native app bundle with system integration |
            | Linux | Desktop | Binary with desktop environment support |
            | Android | Mobile | StealthDNS Browser with integrated NHP WebView |
            | iOS | Mobile | StealthDNS Browser with integrated NHP WebView (unsigned, for sideloading) |

            ### Installation Notes

            **Windows**: Extract the zip and run `stealthdns-ui.exe`

            **macOS**: Open the DMG and drag StealthDNS to Applications

            **Linux**: Extract the tarball and run `./stealthdns`

            **Android**: Enable "Install from unknown sources" and install the APK

            **iOS**: Requires sideloading via AltStore, Sideloadly, or similar tools
